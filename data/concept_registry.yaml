    difficulty: advanced
    category: dql

  - id: window-functions
    name: Window Functions
    definition: Functions that compute values across a set of table rows related to the current row without collapsing them (RANK, ROW_NUMBER, LAG, LEAD, SUM OVER)
    keywords:
