      - delete from
      - remove row
      - drop row
      - truncate table
    related_concepts:
      - insert
      - update
      - where-clause
    prerequisites:
      - update
    difficulty: beginner
    category: dml

  - id: merge
    name: MERGE Statement
    definition: Performs insert, update, or delete operations based on conditions
    keywords:
      - merge
      - upsert
      - insert or update
      - synchronize
    related_concepts:
      - insert
      - update
      - delete
    prerequisites:
      - insert
      - update
    difficulty: advanced
    category: dml

  # Data Definition Language (DDL)
  - id: create-table
    name: CREATE TABLE
    definition: Creates a new table with specified columns and constraints
    keywords:
      - create table
      - table definition
      - ddl
      - data definition
      - new table
      - define table
      - schema object
