name: CI

on:
  push:
    branches: [main, master, "feature/*"]
  pull_request:
    branches: [main, master, "feature/*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ghostscript tesseract-ocr

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[server,ocr,test]'
          pip install reportlab  # For generating golden PDF

      - name: Generate golden PDF fixture
        run: |
          python tests/fixtures/generate_golden_pdf.py

      - name: Run golden fixture tests
        run: |
          pytest tests/test_integration_ci.py -v --tb=short
        timeout-minutes: 5

      - name: Run all tests
        run: |
          pytest -v --tb=short

      - name: Run regression detection
        run: |
          # Build baseline if it doesn't exist
          if [ ! -d "tests/baselines/golden_chapter" ]; then
            echo "Creating baseline..."
            mkdir -p tests/baselines/golden_chapter
            algl-pdf index tests/fixtures/golden_chapter.pdf \
              --output-dir tests/baselines/golden_chapter \
              --use-aliases \
              --concepts-config tests/fixtures/golden_concepts.yaml
          fi
          
          # Process current and compare
          algl-pdf index tests/fixtures/golden_chapter.pdf \
            --output-dir /tmp/current_output \
            --use-aliases \
            --concepts-config tests/fixtures/golden_concepts.yaml
          
          # Detect regressions
          algl-pdf detect-regressions \
            tests/baselines/golden_chapter \
            /tmp/current_output \
            --tolerance 0.15
        timeout-minutes: 5

      - name: Run evaluation
        run: |
          algl-pdf evaluate /tmp/current_output \
            --baseline tests/baselines/golden_chapter \
            --threshold 0.70 \
            --output /tmp/evaluation-report.json
          
          # Display report
          cat /tmp/evaluation-report.json
        timeout-minutes: 2

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-py${{ matrix.python-version }}
          path: |
            /tmp/current_output/
            /tmp/evaluation-report.json
            /tmp/regression-report.json
          retention-days: 7

  quality-gates:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[server,ocr,test]'
          pip install reportlab

      - name: Generate and process golden PDF
        run: |
          python tests/fixtures/generate_golden_pdf.py
          algl-pdf index tests/fixtures/golden_chapter.pdf \
            --output-dir /tmp/quality_check \
            --use-aliases \
            --concepts-config tests/fixtures/golden_concepts.yaml

      - name: Quality checks
        run: |
          # Check that expected files exist
          test -f /tmp/quality_check/index.json
          test -f /tmp/quality_check/manifest.json
          test -f /tmp/quality_check/chunks.json
          test -f /tmp/quality_check/concept-manifest.json
          test -f /tmp/quality_check/concepts/README.md
          
          # Check JSON validity
          python -c "import json; json.load(open('/tmp/quality_check/index.json'))"
          python -c "import json; json.load(open('/tmp/quality_check/manifest.json'))"
          python -c "import json; json.load(open('/tmp/quality_check/chunks.json'))"
          python -c "import json; json.load(open('/tmp/quality_check/concept-manifest.json'))"
          
          # Check minimum concept count (should have at least 2-3 concepts)
          python -c "
          import json
          data = json.load(open('/tmp/quality_check/concept-manifest.json'))
          count = data.get('conceptCount', 0)
          assert count >= 2, f'Expected at least 2 concepts, got {count}'
          print(f'✅ Concepts generated: {count}')
          "
          
          # Check chunk count is reasonable (8 pages -> 5-20 chunks based on word count)
          python -c "
          import json
          data = json.load(open('/tmp/quality_check/index.json'))
          count = data.get('chunkCount', 0)
          assert 5 <= count <= 20, f'Expected 5-20 chunks, got {count}'
          print(f'✅ Chunks generated: {count}')
          "

      - name: Check schema versions
        run: |
          python -c "
          import json
          
          # Load index
          index = json.load(open('/tmp/quality_check/index.json'))
          
          # Check schema version
          assert index['schemaVersion'] == 'pdf-index-schema-v2', \
            f\"Unexpected schema version: {index['schemaVersion']}\"
          
          # Check chunker version
          assert index['chunkerVersion'] == 'word-window-180-overlap-30-v1', \
            f\"Unexpected chunker version: {index['chunkerVersion']}\"
          
          # Check embedding model
          assert index['embeddingModelId'] == 'hash-embedding-v1', \
            f\"Unexpected embedding model: {index['embeddingModelId']}\"
          
          print('✅ Schema versions correct')
          "

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run ruff
        run: |
          ruff check src/ tests/ || true

      - name: Run mypy
        run: |
          pip install -e '.[server,ocr,test]'
          mypy src/algl_pdf_helper/ --ignore-missing-imports || true
